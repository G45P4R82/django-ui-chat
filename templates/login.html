{% extends 'base.html' %}

{% block title %}Login - AI Chatbot{% endblock %}

{% block content %}
<div class="flex min-h-screen items-center justify-center p-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
    
    <div class="bg-brand-600 px-8 py-8 text-center">
      <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center text-brand-600 text-3xl mx-auto mb-4 shadow-lg">
        <i class="fa-solid fa-robot"></i>
      </div>
      <h2 class="text-2xl font-bold text-white mb-1">Bem-vindo</h2>
      <p class="text-brand-100 text-sm">Acesse o sistema da Governadoria</p>
    </div>

    <div class="px-8 py-8">
      {% if error_message %}
        <div class="bg-red-50 text-red-600 p-4 rounded-xl mb-6 flex items-start gap-3 border border-red-100 text-sm font-medium">
          <i class="fa-solid fa-circle-exclamation mt-0.5"></i>
          {{ error_message }}
        </div>
      {% endif %}

      <form method="post" class="space-y-5">
        {% csrf_token %}
        <div>
          <label for="username" class="block text-sm font-bold text-gray-700 mb-1.5">Username</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
              <i class="fa-solid fa-user"></i>
            </div>
            <input type="text" id="username" name="username" required
              class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all text-gray-800 placeholder-gray-400" placeholder="Enter your username">
          </div>
        </div>
        
        <div>
          <label for="password" class="block text-sm font-bold text-gray-700 mb-1.5">Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
              <i class="fa-solid fa-lock"></i>
            </div>
            <input type="password" id="password" name="password" required
              class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all text-gray-800 placeholder-gray-400" placeholder="Enter your password">
          </div>
        </div>
        
        <div class="pt-2">
          <button type="submit" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3 rounded-xl transition-colors shadow-md flex justify-center items-center gap-2 text-lg active:scale-[0.98]">
            Sign In <i class="fa-solid fa-arrow-right text-sm"></i>
          </button>
        </div>
      </form>
    </div>

  </div>
</div>
{% endblock %}
