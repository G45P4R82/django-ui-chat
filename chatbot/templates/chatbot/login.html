{% extends 'chatbot/base.html' %}

{% block title %}Login - AI Chatbot{% endblock %}

{% block content %}
<!-- Botão Toggle fora do form de login -->
<div class="absolute top-4 right-4">
  <button onclick="toggleDarkMode()" class="w-10 h-10 flex items-center justify-center bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-gray-500 dark:text-gray-300 rounded-lg shadow-sm transition-colors">
    <i class="fa-solid fa-moon dark:hidden"></i>
    <i class="fa-solid fa-sun hidden dark:block text-yellow-400"></i>
  </button>
</div>

<div class="flex min-h-screen items-center justify-center p-4">
  <div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-2xl shadow-xl overflow-hidden border border-gray-100 dark:border-gray-700 transition-colors">
    
    <div class="bg-brand-600 px-8 py-8 text-center">
      <div class="w-16 h-16 bg-white dark:bg-gray-900 rounded-full flex items-center justify-center text-brand-600 dark:text-brand-400 text-3xl mx-auto mb-4 shadow-lg">
        <i class="fa-solid fa-robot"></i>
      </div>
      <h2 class="text-2xl font-bold text-white mb-1">Bem-vindo</h2>
      <p class="text-brand-100 text-sm">Acesse o sistema da Governadoria</p>
    </div>

    <div class="px-8 py-8">
      {% if error_message %}
        <div class="bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 p-4 rounded-xl mb-6 flex items-start gap-3 border border-red-100 dark:border-red-800 text-sm font-medium">
          <i class="fa-solid fa-circle-exclamation mt-0.5"></i>
          {{ error_message }}
        </div>
      {% endif %}

      <form method="post" class="space-y-5">
        {% csrf_token %}
        <div>
          <label for="username" class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5">Username</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
              <i class="fa-solid fa-user"></i>
            </div>
            <input type="text" id="username" name="username" required
              class="w-full pl-10 pr-4 py-3 bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all text-gray-800 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500" placeholder="Enter your username">
          </div>
        </div>
        
        <div>
          <label for="password" class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5">Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
              <i class="fa-solid fa-lock"></i>
            </div>
            <input type="password" id="password" name="password" required
              class="w-full pl-10 pr-4 py-3 bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all text-gray-800 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500" placeholder="Enter your password">
          </div>
        </div>
        
        <div class="pt-2">
          <button type="submit" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3 rounded-xl transition-colors shadow-md flex justify-center items-center gap-2 text-lg active:scale-[0.98]">
            Sign In <i class="fa-solid fa-arrow-right text-sm"></i>
          </button>
        </div>
      </form>
    </div>

  </div>
</div>
{% endblock %}
